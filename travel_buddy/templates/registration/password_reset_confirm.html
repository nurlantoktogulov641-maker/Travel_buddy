{% extends 'base.html' %}
{% block toasts %}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card">
            <div class="card-body" style="padding: 32px;">
                <div class="text-center mb-4">
                    <span style="display: inline-flex; align-items: center; justify-content: center; width: 56px; height: 56px; border-radius: 16px; background: var(--tb-primary-soft); color: var(--tb-primary); font-size: 24px;">
                        <i class="fas fa-lock"></i>
                    </span>
                    <h2 style="font-size: 22px; margin-top: 14px;">Новый пароль</h2>
                    <p class="text-muted" style="font-size: 14px;">Придумай надёжный пароль</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Новый пароль</label>
                        <input type="password" name="new_password1" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Подтверждение</label>
                        <input type="password" name="new_password2" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Сменить пароль</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
