{% extends 'base.html' %}

{% block title %}Восстановление пароля - Travel Buddy{% endblock %}
{% block toasts %}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card">
            <div class="card-body" style="padding: 32px;">
                <div class="text-center mb-4">
                    <span style="display: inline-flex; align-items: center; justify-content: center; width: 56px; height: 56px; border-radius: 16px; background: var(--tb-orange-soft); color: var(--tb-orange); font-size: 24px;">
                        <i class="fas fa-key"></i>
                    </span>
                    <h2 style="font-size: 22px; margin-top: 14px;">Восстановление пароля</h2>
                    <p class="text-muted" style="font-size: 14px;">Введи email — мы отправим ссылку для сброса</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Отправить</button>
                </form>

                <p class="text-center mt-4 mb-0">
                    <a href="{% url 'login' %}" style="font-size: 14px;">
                        <i class="fas fa-arrow-left"></i> Вернуться ко входу
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
