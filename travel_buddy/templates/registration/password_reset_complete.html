{% extends 'base.html' %}
{% block toasts %}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card">
            <div class="card-body text-center" style="padding: 32px;">
                <span style="display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; border-radius: 16px; background: var(--tb-teal-soft); color: var(--tb-teal); font-size: 28px;">
                    <i class="fas fa-check"></i>
                </span>
                <h2 style="font-size: 20px; margin: 16px 0 8px;">Пароль изменён</h2>
                <p class="text-muted">Теперь ты можешь войти с новым паролем.</p>
                <a href="{% url 'login' %}" class="btn btn-primary mt-2">Войти</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
