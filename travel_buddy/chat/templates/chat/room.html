{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">💬 Чат маршрута: {{ route.title }}</h5>
        </div>
        <div class="card-body" style="height: 500px; overflow-y: auto;" id="chatMessages">
            {% for message in messages %}
                <div class="message {% if message.sender == user %}message-sent{% else %}message-received{% endif %}">
                    <strong>{{ message.sender.username }}</strong>
                    <p class="mb-1">{{ message.text }}</p>
                    <small class="time">{{ message.created_at|date:"d.m.Y H:i" }}</small>
                </div>
            {% empty %}
                <p class="text-center text-muted">Нет сообщений. Напишите первым!</p>
            {% endfor %}
        </div>
        <div class="card-footer">
            <form method="post">
                {% csrf_token %}
                <div class="input-group">
                    <input type="text" name="text" class="form-control" placeholder="Введите сообщение..." required>
                    <button class="btn btn-primary" type="submit">Отправить</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    var chatMessages = document.getElementById('chatMessages');
    if (chatMessages) {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
</script>
{% endblock %}
