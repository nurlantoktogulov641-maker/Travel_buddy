{% extends 'base.html' %}

{% block title %}Редактирование профиля{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">
        <div class="mb-3">
            <a href="{% url 'profile' profile_user.id %}" style="color: var(--tb-text-muted); font-size: 14px;">
                <i class="fas fa-arrow-left"></i> К профилю
            </a>
        </div>
        <div class="card">
            <div class="card-header">
                <h3 style="font-size: 22px; margin: 0;">
                    <i class="fas fa-user-pen text-primary"></i> Редактирование профиля
                </h3>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <!-- Avatar -->
                    <div class="text-center mb-4">
                        {% if profile_user.avatar %}
                            <img src="{{ profile_user.avatar.url }}" alt="avatar" style="width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 4px solid var(--tb-bg); box-shadow: var(--tb-shadow);">
                        {% else %}
                            <div style="width: 130px; height: 130px; border-radius: 50%; background: var(--tb-primary); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 48px; margin: 0 auto;">
                                {{ profile_user.username|make_list|first|upper }}
                            </div>
                        {% endif %}
                        <div class="mt-3" style="max-width: 360px; margin: 12px auto 0;">
                            <input type="file" name="avatar" class="form-control" accept="image/*">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">О себе</label>
                        <textarea name="bio" class="form-control" rows="4" placeholder="Расскажи о себе и своих путешествиях…">{{ profile_user.bio }}</textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Интересы</label>
                        <textarea name="interests" class="form-control" rows="3" placeholder="Горы, треккинг, фотография…">{{ profile_user.interests }}</textarea>
                    </div>

                    <div class="d-flex gap-2 justify-content-end">
                        <a href="{% url 'profile' profile_user.id %}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
