{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-9 col-lg-8">
        <div class="mb-3">
            <a href="{% url 'route_detail' route.id %}" style="color: var(--tb-text-muted); font-size: 14px;">
                <i class="fas fa-arrow-left"></i> К маршруту
            </a>
        </div>
        <div class="card">
            <div class="card-header">
                <h3 style="font-size: 22px; margin: 0;">
                    <i class="fas fa-pen text-primary"></i> Редактировать маршрут
                </h3>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <div class="d-flex gap-2 justify-content-end mt-4">
                        <a href="{% url 'route_detail' route.id %}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
